allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}

// The subprojects evaluation dependency is removed to fix NPE in dev.flutter.flutter-gradle-plugin


tasks.register("clean", Delete) {
    delete rootProject.buildDir
}

name: financeflow
description: Movo — premium financial management app.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Networking
  http: ^1.2.0
  flutter_dotenv: ^6.0.1
  connectivity_plus: ^7.1.1
  app_settings: ^7.0.0

  # Media
  image_picker: ^1.0.7

  # Persistence
  shared_preferences: ^2.2.2

  # Formatting
  intl: ^0.20.2

  # Ads
  google_mobile_ads: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
